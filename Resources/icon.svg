<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient: dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Purple glow gradient for bell -->
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Green accent gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>

    <!-- Purple glow filter -->
    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>

    <!-- Star glow -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" clip-path="url(#roundedClip)">
    <line x1="0" y1="128" x2="1024" y2="128" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="384" x2="1024" y2="384" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="640" x2="1024" y2="640" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="896" x2="1024" y2="896" stroke="#a78bfa" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="#a78bfa" stroke-width="1"/>
    <line x1="896" y1="0" x2="896" y2="1024" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Glow backdrop behind bell -->
  <ellipse cx="512" cy="490" rx="230" ry="230" fill="#7c3aed" opacity="0.18" filter="url(#purpleGlow)"/>

  <!-- ── ALARM BELL ── -->
  <g filter="url(#shadow)">
    <!-- Bell body -->
    <path d="
      M512 220
      C400 220 320 310 320 430
      L300 630
      L724 630
      L704 430
      C704 310 624 220 512 220
      Z
    " fill="url(#bellGrad)"/>

    <!-- Bell dome highlight -->
    <path d="
      M512 248
      C422 248 358 322 358 430
      L348 530
      C390 480 450 455 512 455
      C574 455 634 480 676 530
      L666 430
      C666 322 602 248 512 248
      Z
    " fill="white" opacity="0.12"/>

    <!-- Clapper bar -->
    <rect x="270" y="620" width="484" height="48" rx="24" fill="#6d28d9"/>

    <!-- Clapper ball -->
    <circle cx="512" cy="700" r="52" fill="url(#bellGrad)"/>
    <circle cx="512" cy="700" r="52" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>

    <!-- Bell top knob -->
    <rect x="488" y="168" width="48" height="62" rx="24" fill="#6d28d9"/>
    <circle cx="512" cy="164" r="28" fill="#7c3aed"/>
  </g>

  <!-- ── EXCLAMATION MARK ── -->
  <g>
    <rect x="496" y="310" width="32" height="170" rx="16" fill="white" opacity="0.95"/>
    <circle cx="512" cy="530" r="20" fill="white" opacity="0.95"/>
  </g>

  <!-- ── DECORATIVE STARS (RPG feel) ── -->
  <!-- Top-left star -->
  <g transform="translate(175, 200)" filter="url(#starGlow)">
    <polygon points="0,-22 5,-8 20,-8 9,2 13,17 0,8 -13,17 -9,2 -20,-8 -5,-8" fill="#fbbf24" opacity="0.9"/>
  </g>
  <!-- Top-right star -->
  <g transform="translate(849, 240)" filter="url(#starGlow)">
    <polygon points="0,-16 4,-6 14,-6 7,1 9,12 0,6 -9,12 -7,1 -14,-6 -4,-6" fill="#fbbf24" opacity="0.7"/>
  </g>
  <!-- Bottom-left small star -->
  <g transform="translate(210, 750)" filter="url(#starGlow)">
    <polygon points="0,-12 3,-4 10,-4 5,1 7,9 0,4 -7,9 -5,1 -10,-4 -3,-4" fill="#a78bfa" opacity="0.8"/>
  </g>
  <!-- Bottom-right star -->
  <g transform="translate(820, 720)" filter="url(#starGlow)">
    <polygon points="0,-18 4,-7 17,-7 7,1 11,14 0,7 -11,14 -7,1 -17,-7 -4,-7" fill="#22c55e" opacity="0.85"/>
  </g>

  <!-- ── BOTTOM LABEL BAND ── -->
  <rect x="0" y="830" width="1024" height="194" rx="0" fill="#0f172a" opacity="0.55" clip-path="url(#roundedClip)"/>
  <rect x="0" y="830" width="1024" height="6" fill="#7c3aed" opacity="0.9" clip-path="url(#roundedClip)"/>

  <!-- "RPG" text -->
  <text x="512" y="916"
    font-family="'SF Pro Rounded', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    text-anchor="middle"
    letter-spacing="12"
    fill="url(#bellGrad)">RPG</text>

  <!-- "ALARM" text -->
  <text x="512" y="985"
    font-family="'SF Pro Rounded', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="600"
    text-anchor="middle"
    letter-spacing="18"
    fill="#64748b">ALARM</text>

  <!-- Thin purple border -->
  <rect x="4" y="4" width="1016" height="1016" rx="221" ry="221"
    fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.35"/>
</svg>
