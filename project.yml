name: RPGAlarm
options:
  bundleIdPrefix: com.rpgalarm
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI
    from: "1.0.0"

targets:
  RPGAlarm:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "SETUP.md"
          - "*.xcodeproj/**"
          - "*.xcworkspace/**"
          - "build/**"
          - "*.md"
    dependencies:
      - package: ConfettiSwiftUI
    info:
      path: RPGAlarm/Info.plist
      properties:
        CFBundleName: RPGAlarm
        CFBundleDisplayName: RPG Alarm
        CFBundleIdentifier: com.rpgalarm.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationUsageDescription: "RPG Alarm нужны уведомления, чтобы будить вас в нужное время."
        UIBackgroundModes:
          - audio
          - fetch
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.rpgalarm.app
        DEVELOPMENT_TEAM: TRB4NNZXDQ
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
